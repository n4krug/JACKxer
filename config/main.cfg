
counter ch = 12
counter aux = 2

node In{ch+1} = wav(file.wav)
node In7 = wav(test.wav)
node In0 = noise(white)
node In1 = noise(pink)

node Solo = gain()

connect = Main.Master -> Ryzen HD Audio Controller Speaker:playback_FL
connect = Main.Master -> Ryzen HD Audio Controller Speaker:playback_FR

connect = Main.Main{ch}.3.gain:solo -> global.Solo
connect = Main.Master.1.gain:solo -> global.Solo
connect = Aux {aux}.Ch{ch}.3.gain:solo -> global.Solo
connect = Aux {aux}.Master.1.gain:solo -> global.Solo
connect = global.Solo -> Ryzen HD Audio Controller Headphones:playback_FL
connect = global.Solo -> Ryzen HD Audio Controller Headphones:playback_FR

[ Main ]
chain Main{ch} = global.In{ch} -> compressor() -> eq(4) -> gain() -> Master

chain Master = eq(6) -> gain()

[ Aux {aux} ]
chain Ch{ch} = global.In{ch} -> compressor() -> eq(4) -> gain() -> Master

chain Master = eq(6) -> gain() 

